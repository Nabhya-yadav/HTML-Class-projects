<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
   <h3>Sample Form</h3>
   <form>
    <fieldset>
        <legend> 
            Personal Details
        </legend>
        <label>Name: </label>
        <input type="text" id="name">
        <br>
        <br>
        <label>Email: </label>
        <input type="text" id="email">
        <br>
        <br>
        <label>Contact No. </label>
        <input type="password" id="password">
        <br>
        <br>
        <label>Gender</label><br>
        <input type="radio" id="male">Male<br>
        <input type="radio" id="female">Female
        <br>
        <br>
        <label>List of cities</label><br>
        <input type="checkbox" id="chennai" name="cities">Chennai<br>
        <input type="checkbox" id="mumbai" name="cities">Mumbai<br>
        <input type="checkbox" id="new delhi" name="cities">New Delhi<br>
        <br>
        <label>Cars</label><br>
        <select id="cars">
            <option value="audi">Audi</option>
            <option value="bmw">BMW</option>
            <br>
            
        </select>
        <br>
        <br>
        <label>Birthday</label>
        <input type="date" id="date">
        <br>
        <br>
        <button>Submit</button>
    </fieldset>
   </form> 
</body>
</html>
